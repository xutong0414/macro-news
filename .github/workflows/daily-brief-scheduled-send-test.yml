name: Daily Brief Scheduled Send Test

on:
  schedule:
    # Temporary one-time schedule test:
    # 2026-06-06 15:30 Hong Kong time = 2026-06-06 07:30 UTC.
    # Remove after confirmation.
    - cron: "30 7 6 6 *"

permissions:
  contents: read

jobs:
  scheduled-send-test:
    name: Send One Scheduled Test Brief
    runs-on: ubuntu-latest

    steps:
      - name: Check scheduled test date
        id: scheduled_date
        run: |
          if [ "$(date -u +%Y-%m-%d)" = "2026-06-06" ]; then
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.scheduled_date.outputs.should_send == 'true'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.scheduled_date.outputs.should_send == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.scheduled_date.outputs.should_send == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        if: steps.scheduled_date.outputs.should_send == 'true'
        run: pytest -q

      - name: Validate required secrets
        if: steps.scheduled_date.outputs.should_send == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BRIEF_FROM_EMAIL: ${{ secrets.BRIEF_FROM_EMAIL }}
          BRIEF_TO_EMAIL: ${{ secrets.BRIEF_TO_EMAIL }}
          BRIEF_TIMEZONE: ${{ secrets.BRIEF_TIMEZONE }}
        run: |
          python - <<'PY'
          import os

          required = [
              "GEMINI_API_KEY",
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_USER",
              "SMTP_PASSWORD",
              "BRIEF_FROM_EMAIL",
              "BRIEF_TO_EMAIL",
              "BRIEF_TIMEZONE",
          ]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              raise SystemExit("Missing GitHub Secrets: " + ", ".join(missing))
          print("Required GitHub secret names are present.")
          PY

      - name: Send scheduled test brief email
        if: steps.scheduled_date.outputs.should_send == 'true'
        env:
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BRIEF_FROM_EMAIL: ${{ secrets.BRIEF_FROM_EMAIL }}
          BRIEF_TO_EMAIL: ${{ secrets.BRIEF_TO_EMAIL }}
          BRIEF_TIMEZONE: ${{ secrets.BRIEF_TIMEZONE }}
          BRIEF_RUN_MODE: live
          MARKET_DATA_MODE: live
          CALENDAR_MODE: live
          THEME_SOURCE_MODE: live
        run: macro-news run --send --use-llm --live-market-data --live-calendar --live-theme-radar

      - name: Upload scheduled test artifacts
        if: always() && steps.scheduled_date.outputs.should_send == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: daily-brief-scheduled-send-test
          path: |
            outputs/latest/
            outputs/archive/
            logs/
          if-no-files-found: ignore

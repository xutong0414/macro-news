name: Daily Brief Scheduled Send Proof

on:
  schedule:
    # Temporary proof of scheduled email delivery:
    # Every 5 minutes during 2026-06-06 17:40-18:15 Hong Kong time.
    # GitHub schedules use UTC, so this is 2026-06-06 09:40-10:15 UTC.
    # Remove or replace after confirmation.
    - cron: "*/5 9-10 6 6 *"

permissions:
  actions: read
  contents: read

concurrency: daily-brief-scheduled-send-proof

jobs:
  scheduled-send-proof:
    name: Send One Scheduled Proof Brief
    runs-on: ubuntu-latest

    steps:
      - name: Decide whether to send scheduled proof
        id: scheduled_proof
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          window_start = datetime(2026, 6, 6, 9, 40, tzinfo=timezone.utc)
          window_end = datetime(2026, 6, 6, 10, 15, tzinfo=timezone.utc)
          should_send = False
          reason = ""

          if not (window_start <= now <= window_end):
              reason = f"Outside scheduled proof window: {now.isoformat()}"
          else:
              repo = os.environ["GITHUB_REPOSITORY"]
              run_id = int(os.environ["GITHUB_RUN_ID"])
              token = os.environ["GITHUB_TOKEN"]
              url = (
                  f"https://api.github.com/repos/{repo}/actions/workflows/"
                  "daily-brief-scheduled-send-proof.yml/runs"
                  "?event=schedule&status=success&per_page=20"
              )
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  data = json.load(response)

              prior_successes = [
                  run
                  for run in data.get("workflow_runs", [])
                  if int(run["id"]) != run_id
                  and run.get("head_branch") == "main"
                  and run.get("created_at", "").startswith("2026-06-06")
              ]
              if prior_successes:
                  reason = "A prior successful scheduled proof already ran today."
              else:
                  should_send = True
                  reason = f"Inside scheduled proof window with no prior success: {now.isoformat()}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"should_send={str(should_send).lower()}\n")
              output.write(f"reason={reason}\n")

          print(reason)
          PY

      - name: Check out repository
        if: steps.scheduled_proof.outputs.should_send == 'true'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.scheduled_proof.outputs.should_send == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.scheduled_proof.outputs.should_send == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        if: steps.scheduled_proof.outputs.should_send == 'true'
        run: pytest -q

      - name: Validate required secrets
        if: steps.scheduled_proof.outputs.should_send == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BRIEF_FROM_EMAIL: ${{ secrets.BRIEF_FROM_EMAIL }}
          BRIEF_TO_EMAIL: ${{ secrets.BRIEF_TO_EMAIL }}
          BRIEF_TIMEZONE: ${{ secrets.BRIEF_TIMEZONE }}
        run: |
          python - <<'PY'
          import os

          required = [
              "GEMINI_API_KEY",
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_USER",
              "SMTP_PASSWORD",
              "BRIEF_FROM_EMAIL",
              "BRIEF_TO_EMAIL",
              "BRIEF_TIMEZONE",
          ]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              raise SystemExit("Missing GitHub Secrets: " + ", ".join(missing))
          print("Required GitHub secret names are present.")
          PY

      - name: Send scheduled proof brief email
        if: steps.scheduled_proof.outputs.should_send == 'true'
        env:
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BRIEF_FROM_EMAIL: ${{ secrets.BRIEF_FROM_EMAIL }}
          BRIEF_TO_EMAIL: ${{ secrets.BRIEF_TO_EMAIL }}
          BRIEF_TIMEZONE: ${{ secrets.BRIEF_TIMEZONE }}
          BRIEF_RUN_MODE: live
          MARKET_DATA_MODE: live
          CALENDAR_MODE: live
          THEME_SOURCE_MODE: live
        run: macro-news run --send --use-llm --live-market-data --live-calendar --live-theme-radar

      - name: Upload scheduled proof artifacts
        if: always() && steps.scheduled_proof.outputs.should_send == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: daily-brief-scheduled-send-proof
          path: |
            outputs/latest/
            outputs/archive/
            logs/
          if-no-files-found: ignore
